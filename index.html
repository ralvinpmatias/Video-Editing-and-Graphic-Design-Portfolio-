<!DOCTYPE html>
<html>
<head>
  <title>Ralvin Portfolio</title>

  <style>

    body{
      margin:0;
      background:#0f0f0f;
      color:white;
      font-family:Arial;
    }

    .hero{
      text-align:center;
      padding:100px 20px;
    }

    .hero h1{
      font-size:70px;
      margin-bottom:10px;
    }

    .hero p{
      color:#bdbdbd;
      font-size:22px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:20px;
      padding:40px;
    }

    .gallery img{
      width:100%;
      border-radius:20px;
      transition:0.3s;
    }

    .gallery img:hover{
      transform:scale(1.03);
    }

  </style>

</head>

<body>

<div class="hero">
  <h1>RALVIN PORTFOLIO</h1>

  <p>
    Video Editor • Graphic Designer • Social Media Manager
  </p>
</div>

<div class="gallery">

  <img src="2025 1.png">

  <img src="christmas_2.png">

  <img src="sweldo-1.png">

</div>

</body>
</html>
